# Default CLI values used when options are omitted.
#
# Precedence is:
#   command line option > environment variable > config.toml > built-in default
#
# Use snake_case keys matching the Python option names. Kebab-case is accepted too.
# The short key `model` is accepted as an alias for Click's internal `model_name`.

[defaults]
corpus = "tinystories"
streaming = false
text_normalization = "lossy-ascii"
train_ratio = 0.8
split_seed = 42
evaluation_partition = "validation"

[clearml]
clearml_project = "language-models-experiments"
clearml_config_file = "clearml.conf"
clearml_connectivity_check = true
clearml_output_uri = "http://localhost:8081"
clearml_tags = []

[pipeline]
# pipeline_version defaults to the project version in pyproject.toml.
pipeline_name = "language-models-experiments"
tokenizer_pipeline_name = "language-models-experiments-tokenizers"
pipeline_local = true
controller_queue = "services"
add_run_number = true

# Uncomment limits for smoke runs.
# training_limit = 50
# evaluation_limit = 50
# Or pass --limit 50 to apply the same limit to model training and evaluation.
#
# Source dataset splits are merged before project train/validation partitioning.
# Leave source_split unset to merge all available source splits, or set it to a
# source split name such as "train" to restrict the input rows before partitioning.

[tokenizer_pipeline]
# pipeline_version defaults to the project version in pyproject.toml.
pipeline_name = "language-models-experiments-tokenizers"
pipeline_local = true
controller_queue = "services"
add_run_number = true

[train_sentencepiece]
# The tokenizer model name defaults to "<corpus>-sentencepiece-<vocab_size>"
# unless artifact_name is set explicitly.
vocab_size = 1000
model_type = "unigram"
character_coverage = 1.0
hard_vocab_limit = true

[train]
model = "bigram"
# The training pipeline resolves the latest tokenizer pipeline run matching
# this tokenizer model name and the configured corpus.
tokenizer_model_name = "tinystories-sentencepiece-1000"
smoothing = 0.1
unigram_weight = 0.1
bigram_weight = 0.3
trigram_weight = 0.6
discount = 0.75

[evaluate]
top_k = 5

[query]
prompt = "once upon"
max_tokens = 80
top_k = 10
decoding = "sample"
temperature = 1.0
seed = 1

[corpus_stats]
top_n_lengths = 5
preview_chars = 120
